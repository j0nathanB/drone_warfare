<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Warfare Visualization - UI Redesign</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Drone Strike Analysis 2004-2020</h1>
            <div class="view-modes">
                <button class="view-mode-btn active" data-mode="map">Map View</button>
                <button class="view-mode-btn" data-mode="timeline">Timeline</button>
                <button class="view-mode-btn" data-mode="compare">Compare</button>
                <button class="view-mode-btn" data-mode="stories">Stories</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-toggle">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>

            <!-- Visual Breadcrumbs -->
            <div class="visual-breadcrumbs">
                <div class="breadcrumb-path">
                    <div class="breadcrumb-node" data-level="world">
                        <span>Global</span>
                    </div>
                    <span class="breadcrumb-arrow">→</span>
                    <div class="breadcrumb-node active" data-level="country">
                        <span>Pakistan</span>
                    </div>
                </div>
                
                <!-- Depth Control -->
                <div class="depth-control">
                    <div class="depth-slider">
                        <div class="depth-slider-fill"></div>
                    </div>
                    <div class="depth-labels">
                        <span>Country</span>
                        <span>Province</span>
                        <span>District</span>
                        <span>Location</span>
                    </div>
                </div>
            </div>

            <!-- Info Panel -->
            <div class="info-panel">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">423</div>
                        <div class="stat-label">Total Strikes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">4,012</div>
                        <div class="stat-label">Total Deaths</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">310</div>
                        <div class="stat-label">Civilians</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">183</div>
                        <div class="stat-label">Children</div>
                    </div>
                </div>

                <h3 style="margin-bottom: 16px; font-size: 16px; color: rgba(255,255,255,0.8);">
                    Regional Breakdown
                </h3>
                <div id="region-list">
                    <!-- Dynamic content -->
                </div>
            </div>
        </aside>

        <!-- Map Container -->
        <div class="map-container">
            <div id="map"></div>
            
            <!-- Layer Controls -->
            <div class="layer-controls">
                <h4 style="margin-bottom: 12px; font-size: 14px;">Data Layers</h4>
                <div class="layer-toggle">
                    <input type="checkbox" id="heatmap" checked>
                    <label for="heatmap">Heat Map</label>
                </div>
                <div class="layer-toggle">
                    <input type="checkbox" id="boundaries" checked>
                    <label for="boundaries">Boundaries</label>
                </div>
                <div class="layer-toggle">
                    <input type="checkbox" id="strikes">
                    <label for="strikes">Strike Points</label>
                </div>
                <div class="layer-toggle">
                    <input type="checkbox" id="civilian">
                    <label for="civilian">Civilian Impact</label>
                </div>
            </div>

            <!-- Mini Map -->
            <div class="mini-map">
                <div class="mini-map-content">
                    <div class="mini-map-viewport" style="top: 40%; left: 50%; width: 30%; height: 40%;"></div>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <div class="timeline-container">
            <div class="timeline-header">
                <h3 class="timeline-title">Timeline: 2004 - 2020</h3>
                <div class="play-controls">
                    <button class="play-btn">Play</button>
                    <button class="play-btn">Pause</button>
                    <button class="play-btn">Previous</button>
                    <button class="play-btn">Next</button>
                </div>
            </div>
            <div class="timeline-track">
                <div class="timeline-bars">
                    <!-- Generate bars for each year -->
                    <div class="timeline-bar" style="height: 20%"></div>
                    <div class="timeline-bar" style="height: 35%"></div>
                    <div class="timeline-bar" style="height: 45%"></div>
                    <div class="timeline-bar" style="height: 65%"></div>
                    <div class="timeline-bar" style="height: 80%"></div>
                    <div class="timeline-bar" style="height: 90%"></div>
                    <div class="timeline-bar" style="height: 85%"></div>
                    <div class="timeline-bar" style="height: 70%"></div>
                    <div class="timeline-bar" style="height: 60%"></div>
                    <div class="timeline-bar" style="height: 55%"></div>
                    <div class="timeline-bar" style="height: 45%"></div>
                    <div class="timeline-bar" style="height: 40%"></div>
                    <div class="timeline-bar" style="height: 30%"></div>
                    <div class="timeline-bar" style="height: 25%"></div>
                    <div class="timeline-bar" style="height: 15%"></div>
                    <div class="timeline-bar" style="height: 10%"></div>
                    <div class="timeline-bar" style="height: 5%"></div>
                </div>
            </div>
        </div>

        <!-- Comparison Panel -->
        <div class="comparison-panel">
            <h3 style="margin-bottom: 16px; font-size: 16px;">Region Comparison</h3>
            <p style="color: rgba(255,255,255,0.6); font-size: 14px;">
                Select multiple regions to compare statistics
            </p>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p>Loading strike data...</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="testPage.js"></script>
</body>
</html>
