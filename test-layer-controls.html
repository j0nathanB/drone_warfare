<!DOCTYPE html>
<html>
<head>
    <title>Layer Controls Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #222; color: white; }
        .test-container { max-width: 800px; margin: 0 auto; }
        .result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .pass { background: #4ade80; color: black; }
        .fail { background: #ef4444; }
        iframe { width: 100%; height: 600px; border: 1px solid #666; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Layer Controls Functionality Test</h1>
        <iframe src="http://localhost:8000" id="testFrame"></iframe>
        <div id="results"></div>
        
        <script>
            setTimeout(() => {
                const frame = document.getElementById('testFrame');
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                const results = document.getElementById('results');
                
                // Test 1: Check if toggle button exists
                const toggleBtn = frameDoc.querySelector('[data-cy="layer-controls-toggle"]');
                if (toggleBtn) {
                    results.innerHTML += '<div class="result pass">✓ Toggle button found</div>';
                    results.innerHTML += '<div class="result pass">✓ Button text: "' + toggleBtn.textContent.trim() + '"</div>';
                    
                    // Test 2: Check if clicking works
                    const panel = frameDoc.querySelector('[data-cy="layer-controls"]');
                    const initialCollapsed = panel.classList.contains('collapsed');
                    
                    toggleBtn.click();
                    
                    setTimeout(() => {
                        const afterClickCollapsed = panel.classList.contains('collapsed');
                        if (initialCollapsed !== afterClickCollapsed) {
                            results.innerHTML += '<div class="result pass">✓ Toggle functionality works</div>';
                        } else {
                            results.innerHTML += '<div class="result fail">✗ Toggle functionality broken</div>';
                        }
                        
                        // Test caret rotation
                        const caret = frameDoc.querySelector('.caret-text');
                        if (caret) {
                            const transform = window.getComputedStyle(caret).transform;
                            results.innerHTML += '<div class="result pass">✓ Caret found with transform: ' + transform + '</div>';
                        } else {
                            results.innerHTML += '<div class="result fail">✗ Caret not found</div>';
                        }
                    }, 500);
                } else {
                    results.innerHTML += '<div class="result fail">✗ Toggle button not found</div>';
                }
            }, 2000);
        </script>
    </div>
</body>
</html>
