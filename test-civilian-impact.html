<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Civilian Impact Toggle</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        #map { height: 400px; width: 100%; margin-bottom: 20px; }
        .controls { margin-bottom: 20px; }
        .status { padding: 10px; background: #f0f0f0; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Civilian Impact Toggle Test</h1>
    
    <div class="controls">
        <label>
            <input type="checkbox" id="civilian"> Show Civilian Impact
        </label>
    </div>
    
    <div id="map"></div>
    
    <div class="status" id="status">Loading...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { DroneWarfareMap } from './src/map.js';
        import { GeoJSONHandler } from './src/geojsonHandler.js';
        
        const status = document.getElementById('status');
        const civilianCheckbox = document.getElementById('civilian');
        
        async function testCivilianImpact() {
            try {
                status.textContent = 'Loading GeoJSON data...';
                
                // Mock app state
                const appState = {
                    admLevel: 0,
                    admName: '',
                    country: null,
                    geojson: {},
                    map: null
                };
                
                // Load data
                const geojsonHandler = new GeoJSONHandler();
                appState.geojson = await geojsonHandler.getData();
                
                status.textContent = 'Initializing map...';
                
                // Initialize map
                const droneWarfareMap = new DroneWarfareMap(appState, () => {});
                appState.map = droneWarfareMap;
                
                // Display initial features
                const initDisplay = [
                    appState.geojson.AFG[0]?.features?.[0] || appState.geojson.AFG[0],
                    appState.geojson.PAK[0]?.features?.[0] || appState.geojson.PAK[0],
                    appState.geojson.SOM[0]?.features?.[0] || appState.geojson.SOM[0],
                    appState.geojson.YEM[0]?.features?.[0] || appState.geojson.YEM[0]
                ].filter(Boolean);
                
                droneWarfareMap.displayFeatures(initDisplay);
                
                // Setup civilian impact toggle
                civilianCheckbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        droneWarfareMap.displayCivilianImpact();
                        status.textContent = 'Civilian impact layer enabled';
                    } else {
                        droneWarfareMap.layers.civilian.clearLayers();
                        status.textContent = 'Civilian impact layer disabled';
                    }
                });
                
                status.textContent = 'Ready! Toggle the civilian impact checkbox to test.';
                
            } catch (error) {
                status.textContent = `Error: ${error.message}`;
                console.error('Test failed:', error);
            }
        }
        
        testCivilianImpact();
    </script>
</body>
</html>
