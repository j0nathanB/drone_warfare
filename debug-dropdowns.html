<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Dropdowns</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        .debug-section {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .debug-btn {
            padding: 10px 20px;
            margin: 5px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .debug-btn:hover {
            background: #2563eb;
        }
        pre {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Dropdown Debug Tool</h1>

    <div class="debug-section">
        <h2>Test Controls</h2>
        <button class="debug-btn" onclick="checkCountryDropdown()">Check Country Dropdown</button>
        <button class="debug-btn" onclick="checkAdm1Dropdown()">Check ADM1 Dropdown</button>
        <button class="debug-btn" onclick="checkAdm2Dropdown()">Check ADM2 Dropdown</button>
        <button class="debug-btn" onclick="simulateCountrySelect()">Simulate Select Pakistan</button>
    </div>

    <div class="debug-section">
        <h2>Debug Output</h2>
        <pre id="output">Waiting for commands...</pre>
    </div>

    <div class="debug-section" style="display: none;">
        <h2>Dropdown Containers</h2>
        <div id="nav-dropdown-country-wrapper"></div>
        <div id="nav-dropdown-adm1-wrapper"></div>
        <div id="nav-dropdown-adm2-wrapper"></div>
        <div id="nav-dropdown-adm3-wrapper"></div>
    </div>

    <script type="module">
        import { CustomDropdown } from './src/customDropdown.js';
        import { DropdownNavigation } from './src/dropdownNavigation.js';
        import { GeoJSONHandler } from './src/geojsonHandler.js';

        let dropdownNav;
        let appState = {
            geojson: {},
            admLevel: 0,
            country: null,
            adm1: null,
            adm2: null,
            adm3: null
        };

        function output(message) {
            document.getElementById('output').textContent = message;
        }

        async function init() {
            output('Loading GeoJSON data...');
            const geojsonHandler = new GeoJSONHandler();

            try {
                appState.geojson = await geojsonHandler.getData();
                output(`GeoJSON loaded! Countries: ${Object.keys(appState.geojson).join(', ')}`);

                // Initialize dropdowns
                dropdownNav = new DropdownNavigation(
                    appState,
                    (props, state) => {
                        output(`selectEntity called with: ${JSON.stringify(props, null, 2)}`);
                    },
                    {
                        handleBreadcrumbClick: () => {}
                    }
                );

                output('Dropdowns initialized! Check them above.');

            } catch (error) {
                output(`Error: ${error.message}\n${error.stack}`);
            }
        }

        window.checkCountryDropdown = () => {
            const options = dropdownNav.dropdowns.country.getOptions();
            output(`Country dropdown has ${options.length} options:\n${JSON.stringify(options, null, 2)}`);
        };

        window.checkAdm1Dropdown = () => {
            const options = dropdownNav.dropdowns.adm1.getOptions();
            const allOptions = dropdownNav.dropdowns.adm1.menu.querySelectorAll('.dropdown-option');
            const visibleOptions = Array.from(allOptions).filter(opt => opt.style.display !== 'none');

            output(`ADM1 dropdown:\n` +
                   `- Total options in memory: ${options.length}\n` +
                   `- Total options in DOM: ${allOptions.length}\n` +
                   `- Visible options in DOM: ${visibleOptions.length}\n\n` +
                   `Visible options:\n${Array.from(visibleOptions).map(opt => opt.textContent).join('\n')}`);
        };

        window.checkAdm2Dropdown = () => {
            const options = dropdownNav.dropdowns.adm2.getOptions();
            const allOptions = dropdownNav.dropdowns.adm2.menu.querySelectorAll('.dropdown-option');
            const visibleOptions = Array.from(allOptions).filter(opt => opt.style.display !== 'none');

            output(`ADM2 dropdown:\n` +
                   `- Total options in memory: ${options.length}\n` +
                   `- Total options in DOM: ${allOptions.length}\n` +
                   `- Visible options in DOM: ${visibleOptions.length}\n\n` +
                   `Visible options (first 10):\n${Array.from(visibleOptions).slice(0, 10).map(opt => opt.textContent).join('\n')}`);
        };

        window.simulateCountrySelect = () => {
            output('Simulating Pakistan selection...');
            dropdownNav.onCountryChange('PAK', 'Pakistan');

            setTimeout(() => {
                window.checkAdm1Dropdown();
            }, 100);
        };

        // Auto-init on load
        init();
    </script>
</body>
</html>
